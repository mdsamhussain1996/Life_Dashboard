<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Dashboard</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel Standalone (for JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Recharts -->
  <script crossorigin src="https://unpkg.com/recharts/umd/Recharts.js"></script>

  <style>
    body { 
      background-color: #f8fafc; 
      font-family: ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
    }
  </style>
</head>
<body class="text-slate-900 min-h-screen">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { BarChart, Bar, XAxis, Tooltip, ResponsiveContainer } = Recharts;

    // --- Custom Hooks ---
    function useLocalStorage(key, initialValue) {
      const [storedValue, setStoredValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initialValue;
        } catch (error) {
          return initialValue;
        }
      });

      useEffect(() => {
        try {
          window.localStorage.setItem(key, JSON.stringify(storedValue));
        } catch (error) {}
      }, [key, storedValue]);

      return [storedValue, setStoredValue];
    }

    // --- Components ---
    function DailyStateCheck({ todayState, setTodayState }) {
      const handleChange = (field, value) => setTodayState(prev => ({ ...prev, [field]: value }));
      const getLabel = (val) => val <= 2 ? "Low" : val === 3 ? "Medium" : "High";
      const getColor = (field, val) => field === 'stress' ? (val > 3 ? 'accent-red-400' : 'accent-indigo-500') : (val > 3 ? 'accent-green-500' : 'accent-indigo-500');

      return (
        <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
          <h2 className="text-lg font-semibold text-slate-800 mb-6">How are you feeling today?</h2>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
            {['mood', 'energy', 'stress'].map(field => (
              <div key={field} className="space-y-3">
                <div className="flex justify-between items-center text-sm">
                  <span className="capitalize font-medium text-slate-700">{field}</span>
                  <span className="text-slate-400 bg-slate-50 px-2 py-1 rounded-md text-xs font-semibold">
                    {getLabel(todayState[field])} ({todayState[field]}/5)
                  </span>
                </div>
                <input 
                  type="range" min="1" max="5" 
                  value={todayState[field]} 
                  onChange={(e) => handleChange(field, parseInt(e.target.value))}
                  className={`w-full ${getColor(field, todayState[field])} cursor-pointer`}
                />
              </div>
            ))}
          </div>
        </div>
      );
    }

    function SmartTaskSystem({ currentEnergy, lowMode }) {
      const [tasks, setTasks] = useLocalStorage('life-dash-tasks', []);
      const [newTask, setNewTask] = useState('');
      const [energyReq, setEnergyReq] = useState('medium');
      const [importance, setImportance] = useState('high');

      const addTask = (e) => {
        e.preventDefault();
        if (!newTask.trim()) return;
        setTasks([{ id: Date.now(), title: newTask, energyReq, importance, done: false }, ...tasks]);
        setNewTask('');
      };

      const toggleTask = (id) => setTasks(tasks.map(t => t.id === id ? { ...t, done: !t.done } : t));
      const deleteTask = (id) => setTasks(tasks.filter(t => t.id !== id));
      const mapEnergy = (val) => val <= 2 ? 'low' : val === 3 ? 'medium' : 'high';

      const suggestedTask = tasks.filter(t => !t.done).sort((a, b) => {
        const energyMatchA = a.energyReq === mapEnergy(currentEnergy) ? 1 : 0;
        const energyMatchB = b.energyReq === mapEnergy(currentEnergy) ? 1 : 0;
        const impA = a.importance === 'high' ? 1 : 0;
        const impB = b.importance === 'high' ? 1 : 0;
        return (energyMatchB + impB) - (energyMatchA + impA);
      })[0];

      if (lowMode) {
        return (
          <div className="bg-indigo-50/50 p-8 rounded-3xl border border-indigo-100/50 text-center space-y-6">
            <h2 className="text-lg font-semibold text-indigo-900 flex justify-center items-center gap-2">
              ⚡ Suggested Task for Now
            </h2>
            {suggestedTask ? (
               <div className="bg-white p-6 rounded-2xl shadow-sm inline-block w-full max-w-sm border border-slate-100">
                 <p className="text-xl font-medium text-slate-800 mb-6">{suggestedTask.title}</p>
                 <button onClick={() => toggleTask(suggestedTask.id)} className="w-full py-3 bg-indigo-600 text-white rounded-xl text-sm font-semibold hover:bg-indigo-700">
                   ✅ Mark as Done
                 </button>
               </div>
            ) : (
              <p className="text-indigo-600/80 font-medium">No pending tasks. Enjoy your rest! ☕</p>
            )}
          </div>
        );
      }

      return (
        <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col h-full">
          <h2 className="text-lg font-semibold text-slate-800 mb-6 flex items-center gap-2">
            📋 Tasks
          </h2>
          {suggestedTask && (
            <div className="mb-6 p-4 bg-gradient-to-r from-indigo-50 to-blue-50 rounded-2xl border border-indigo-100/50 flex justify-between items-center">
              <div>
                <p className="text-xs font-bold text-indigo-500 uppercase tracking-wider mb-1">⚡ Suggested (Matches Energy)</p>
                <p className="text-slate-800 font-medium">{suggestedTask.title}</p>
              </div>
              <button onClick={() => toggleTask(suggestedTask.id)} className="text-indigo-600 text-xl hover:text-indigo-700">✅</button>
            </div>
          )}
          <form onSubmit={addTask} className="flex flex-wrap md:flex-nowrap gap-3 mb-6">
            <input value={newTask} onChange={e => setNewTask(e.target.value)} placeholder="What needs to be done?" className="flex-1 px-4 py-3 bg-slate-50 border border-transparent rounded-xl outline-none focus:border-indigo-300 min-w-[200px] text-sm" />
            <select value={energyReq} onChange={e => setEnergyReq(e.target.value)} className="px-4 py-3 bg-slate-50 border border-transparent rounded-xl text-sm outline-none focus:border-indigo-300">
              <option value="low">Low Energy</option>
              <option value="medium">Med Energy</option>
              <option value="high">High Energy</option>
            </select>
            <select value={importance} onChange={e => setImportance(e.target.value)} className="px-4 py-3 bg-slate-50 border border-transparent rounded-xl text-sm outline-none focus:border-indigo-300">
              <option value="high">High Priority</option>
              <option value="low">Low Priority</option>
            </select>
            <button type="submit" className="p-3 bg-slate-800 text-white rounded-xl hover:bg-slate-700 font-bold px-4">➕</button>
          </form>
          <div className="space-y-2 overflow-y-auto pr-2 flex-1 max-h-[300px]">
            {tasks.map(t => (
              <div key={t.id} className="flex items-center justify-between p-3 hover:bg-slate-50 rounded-xl group transition-all border border-transparent hover:border-slate-100">
                <div className="flex items-center gap-4">
                  <button onClick={() => toggleTask(t.id)} className={`transition-colors ${t.done ? "text-indigo-500" : "text-slate-300 hover:text-slate-400"}`}>
                    {t.done ? "✅" : "⭕"}
                  </button>
                  <span className={`text-sm font-medium ${t.done ? 'text-slate-400 line-through' : 'text-slate-700'}`}>{t.title}</span>
                </div>
                <div className="flex items-center gap-3">
                  {!t.done && (
                     <span className={`text-[10px] uppercase font-bold px-2 py-1 rounded-md ${t.energyReq === 'high' ? 'bg-orange-100 text-orange-700' : t.energyReq === 'low' ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-600'}`}>
                       {t.energyReq} energy
                     </span>
                  )}
                  <button onClick={() => deleteTask(t.id)} className="text-red-400 opacity-0 group-hover:opacity-100 transition-opacity text-xs font-semibold hover:text-red-600">Delete</button>
                </div>
              </div>
            ))}
            {tasks.length === 0 && <p className="text-center text-slate-400 text-sm mt-8">No tasks yet. Add one above!</p>}
          </div>
        </div>
      );
    }

    function ThoughtDump() {
      const [thoughts, setThoughts] = useLocalStorage('life-dash-thoughts', []);
      const [text, setText] = useState('');

      const categorize = (content) => {
        const lower = content.toLowerCase();
        if (/(todo|must|need to|should|fix|call|email|buy)/.test(lower)) return 'Actionable';
        if (/(ignore|whatever|doesn't matter|stupid|annoyed)/.test(lower)) return 'Ignore';
        return 'Revisit Later';
      };

      const saveThought = () => {
        if (!text.trim()) return;
        setThoughts([{
          id: Date.now(),
          text,
          category: categorize(text),
          time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        }, ...thoughts]);
        setText('');
      };

      const getBadgeColor = (cat) => {
        switch (cat) {
          case 'Actionable': return 'bg-amber-100 text-amber-700 border-amber-200';
          case 'Ignore': return 'bg-slate-100 text-slate-500 border-slate-200';
          default: return 'bg-blue-100 text-blue-700 border-blue-200';
        }
      };

      return (
        <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col h-full">
          <h2 className="text-lg font-semibold text-slate-800 mb-4 flex items-center gap-2">
            💬 Thought Dump
          </h2>
          <div className="mb-6 relative">
            <textarea 
              value={text} onChange={(e) => setText(e.target.value)}
              placeholder="What's on your mind? Just write it out..."
              className="w-full p-4 bg-slate-50 border border-transparent rounded-2xl h-32 outline-none focus:border-indigo-300 resize-none text-sm"
            />
            <button onClick={saveThought} className="absolute bottom-3 right-3 px-4 py-2 bg-indigo-600 text-white rounded-xl text-sm font-medium hover:bg-indigo-700">Save</button>
          </div>
          <div className="space-y-3 overflow-y-auto pr-2 max-h-[300px]">
            {thoughts.map(t => (
              <div key={t.id} className="p-4 bg-white border border-slate-100 rounded-2xl text-sm relative group hover:shadow-sm">
                 <p className="text-slate-700 pr-12 leading-relaxed">{t.text}</p>
                 <div className="mt-3 flex items-center justify-between">
                   <span className={`text-[10px] uppercase font-bold tracking-wider px-2 py-1 rounded-md border ${getBadgeColor(t.category)}`}>{t.category}</span>
                   <span className="text-xs font-medium text-slate-400">{t.time}</span>
                 </div>
                 <button onClick={() => setThoughts(thoughts.filter(th => th.id !== t.id))} className="absolute top-4 right-4 text-slate-300 hover:text-red-500 font-bold">✕</button>
              </div>
            ))}
            {thoughts.length === 0 && <p className="text-center text-slate-400 text-sm mt-4">Mind is clear! No thoughts dumped yet.</p>}
          </div>
        </div>
      );
    }

    function DecisionHelper() {
      const [option, setOption] = useState('');
      const [importance, setImportance] = useState(3);
      const [effort, setEffort] = useState(3);
      const [impact, setImpact] = useState(3);
      const [results, setResults] = useState([]);

      const addDecision = (e) => {
        e.preventDefault();
        if (!option.trim()) return;
        const invertedEffort = 6 - effort; 
        const score = Math.round((importance * impact * invertedEffort) / 1.25); 
        setResults([{ id: Date.now(), option, score }, ...results].sort((a,b) => b.score - a.score));
        setOption(''); setImportance(3); setEffort(3); setImpact(3);
      };

      return (
        <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
          <h2 className="text-lg font-semibold text-slate-800 mb-6 flex items-center gap-2">
            ❓ Decision Helper
          </h2>
          <form onSubmit={addDecision} className="space-y-5 mb-8 bg-slate-50 p-5 rounded-2xl border border-slate-100">
            <input value={option} onChange={e => setOption(e.target.value)} placeholder="What are you deciding on?" className="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-indigo-400 text-sm" />
            <div className="space-y-4 text-sm">
              <div className="space-y-1">
                 <div className="flex justify-between items-center"><label className="text-slate-600 font-medium">Importance</label> <span className="font-bold text-slate-800">{importance}/5</span></div>
                 <input type="range" min="1" max="5" value={importance} onChange={e => setImportance(parseInt(e.target.value))} className="w-full accent-indigo-500" />
              </div>
              <div className="space-y-1">
                 <div className="flex justify-between items-center"><label className="text-slate-600 font-medium">Effort required</label> <span className="font-bold text-slate-800">{effort}/5</span></div>
                 <input type="range" min="1" max="5" value={effort} onChange={e => setEffort(parseInt(e.target.value))} className="w-full accent-orange-400" />
              </div>
              <div className="space-y-1">
                 <div className="flex justify-between items-center"><label className="text-slate-600 font-medium">Long-term Impact</label> <span className="font-bold text-slate-800">{impact}/5</span></div>
                 <input type="range" min="1" max="5" value={impact} onChange={e => setImpact(parseInt(e.target.value))} className="w-full accent-green-500" />
              </div>
            </div>
            <button type="submit" className="w-full py-3 bg-slate-800 text-white rounded-xl text-sm font-semibold hover:bg-slate-700">Evaluate Option</button>
          </form>
          {results.length > 0 && (
            <div className="space-y-3">
              <div className="flex justify-between items-end mb-2">
                <p className="text-xs font-bold text-slate-400 uppercase tracking-wider">Recommendations</p>
                <button onClick={() => setResults([])} className="text-xs text-slate-400 hover:text-slate-600 font-medium">Clear all</button>
              </div>
              {results.map((r, i) => (
                 <div key={r.id} className="flex justify-between items-center p-4 rounded-xl bg-white border border-slate-100 shadow-sm relative overflow-hidden">
                   {i === 0 && <div className="absolute left-0 top-0 bottom-0 w-1 bg-green-400"></div>}
                   <span className="text-sm font-medium text-slate-700 pl-2">{r.option}</span>
                   <span className="text-sm font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded-md">{r.score} pts</span>
                 </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function WeeklyInsights({ history }) {
      const recent = history.slice(-7);
      if (recent.length === 0) {
        return (
          <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h2 className="text-lg font-semibold text-slate-800 mb-2">📈 Weekly Insights</h2>
            <p className="text-sm text-slate-500">Log your state for a few days to see insights!</p>
          </div>
        );
      }
      const avgMood = (recent.reduce((acc, curr) => acc + curr.mood, 0) / recent.length).toFixed(1);
      const avgEnergy = (recent.reduce((acc, curr) => acc + curr.energy, 0) / recent.length).toFixed(1);

      let insight = "Keep tracking to learn your patterns.";
      if (avgMood > 3.5 && avgEnergy > 3.5) insight = "You've been in a great state lately! Keep doing what you're doing.";
      else if (avgEnergy < 2.5) insight = "Your energy has been consistently low. Try to schedule more rest.";
      else if (avgMood < 2.5) insight = "It's been a tough week emotionally. Be kind to yourself.";

      const data = recent.map(item => {
        const parts = item.date.split('/');
        return { name: parts.length >= 2 ? `${parts[0]}/${parts[1]}` : item.date, mood: item.mood, energy: item.energy };
      });

      return (
        <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
          <h2 className="text-lg font-semibold text-slate-800 mb-6 flex items-center gap-2">📈 Insights</h2>
          <div className="grid grid-cols-2 gap-4 mb-6">
            <div className="p-4 bg-slate-50 rounded-2xl text-center border border-slate-100">
              <p className="text-[10px] text-slate-500 uppercase font-bold tracking-wider">Avg Mood</p>
              <p className="text-3xl font-black text-slate-800 mt-1">{avgMood}</p>
            </div>
            <div className="p-4 bg-slate-50 rounded-2xl text-center border border-slate-100">
              <p className="text-[10px] text-slate-500 uppercase font-bold tracking-wider">Avg Energy</p>
              <p className="text-3xl font-black text-slate-800 mt-1">{avgEnergy}</p>
            </div>
          </div>
          <p className="text-sm text-indigo-800 bg-indigo-50 p-4 rounded-2xl border border-indigo-100 mb-8 font-medium">💡 {insight}</p>
          <div className="h-40 w-full relative">
            <p className="text-xs text-slate-400 absolute -top-4 right-0 font-medium">Mood & Energy (Past 7 Days)</p>
            {Recharts && (
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={data} margin={{ top: 10, right: 0, left: 0, bottom: 0 }}>
                  <XAxis dataKey="name" fontSize={11} axisLine={false} tickLine={false} tick={{fill: '#94a3b8'}} dy={10} />
                  <Tooltip cursor={{fill: '#f8fafc'}} contentStyle={{ borderRadius: '12px', border: '1px solid #e2e8f0', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)', fontSize: '12px', fontWeight: 500 }}/>
                  <Bar dataKey="mood" fill="#818cf8" radius={[4, 4, 0, 0]} maxBarSize={30} />
                  <Bar dataKey="energy" fill="#f472b6" radius={[4, 4, 0, 0]} maxBarSize={30} />
                </BarChart>
              </ResponsiveContainer>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [lowMode, setLowMode] = useLocalStorage('life-dash-low-mode', false);
      const [history, setHistory] = useLocalStorage('life-dash-history', []);
      const [todayState, setTodayState] = useLocalStorage('life-dash-today', { date: new Date().toLocaleDateString(), mood: 3, energy: 3, stress: 3 });

      useEffect(() => {
        const today = new Date().toLocaleDateString();
        if (todayState.date !== today) {
          setHistory(prev => {
            const exists = prev.find(h => h.date === todayState.date);
            return exists ? prev : [...prev, todayState];
          });
          setTodayState({ date: today, mood: 3, energy: 3, stress: 3 });
        }
      }, [todayState, setHistory, setTodayState]);

      return (
        <div className="max-w-5xl mx-auto p-4 md:p-8 space-y-8 pb-20">
          <header className="flex justify-between items-center pb-4 border-b border-slate-200">
            <h1 className="text-2xl font-bold flex items-center gap-2 text-slate-800">
              🌟 Life Dashboard
            </h1>
            <button onClick={() => setLowMode(!lowMode)} className="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 hover:bg-slate-100 rounded-full text-slate-700 shadow-sm">
              <span className="text-sm font-medium">{lowMode ? "☀️ Normal Mode" : "🌙 Low Mode"}</span>
            </button>
          </header>
          {lowMode ? (
            <div className="max-w-xl mx-auto space-y-8 mt-12">
              <DailyStateCheck todayState={todayState} setTodayState={setTodayState} />
              <SmartTaskSystem currentEnergy={todayState.energy} lowMode={true} />
            </div>
          ) : (
            <div className="space-y-8">
              <section><DailyStateCheck todayState={todayState} setTodayState={setTodayState} /></section>
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="lg:col-span-2 space-y-6">
                  <SmartTaskSystem currentEnergy={todayState.energy} lowMode={false} />
                  <ThoughtDump />
                </div>
                <div className="space-y-6">
                  <WeeklyInsights history={[...history, todayState]} />
                  <DecisionHelper />
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
